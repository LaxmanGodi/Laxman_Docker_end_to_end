apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: env-user-binding
  namespace: python-app-dev
subjects:
- kind: User
  name: "dev-user"
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: environment-developer-role
  apiGroup: rbac.authorization.k8s.io
